<!DOCTYPE html>
<html lang="id" class="light-style" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hygiene Audit App</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="layout-wrapper" id="appContainer" class="active">
        <div class="layout-container">
            <!-- 1. SIDEBAR -->
            <aside class="layout-menu" id="sidebar">
                <div class="app-brand" style="padding:22px 20px; color:white; font-weight:bold; font-size:18px;">
                    Hygiene Audit App
                </div>
                <ul class="menu-inner" style="list-style:none; padding-left:0;">
                    <li class="menu-item" style="padding:10px 20px;"><a href="dashboard.html" style="color:#8b8fa7; text-decoration:none;">Dashboard</a></li>
                    <li class="menu-item" style="padding:10px 20px;"><a href="new-audit.html" style="color:#8b8fa7; text-decoration:none;">Audit Baru</a></li>
                    <li class="menu-item" style="padding:10px 20px;"><a href="history.html" style="color:#8b8fa7; text-decoration:none;">Riwayat</a></li>
                    <li class="menu-item" style="padding:10px 20px;"><a href="admin.html" style="color:#8b8fa7; text-decoration:none;">Admin</a></li>
                </ul>
            </aside>

            <!-- 2. KONTEN UTAMA -->
            <div class="layout-page">
                <!-- NAVBAR -->
                <nav class="layout-navbar">
                    <div class="navbar-page-title">Dashboard</div>
                    <div class="navbar-actions" style="margin-left:auto;">
                        <button class="btn btn-danger" onclick="logout()">Logout</button>
                    </div>
                </nav>

                <!-- AREA KONTEN HALAMAN -->
                <div class="content-wrapper">
                    <div class="content-body" style="padding:24px;">
                        <div class="page active" id="pageDashboard">
                            <div style="margin-bottom:1.5rem;">
                                <h4 style="font-size:1.25rem;font-weight:700;color:#334155;margin-bottom:4px;">Selamat Datang, <span id="dashboardUserName">Admin</span>! 👋</h4>
                                <p id="dashboardDate" style="font-size:.875rem;color:#a1aab2;"></p>
                            </div>
                            <div class="stats-grid">
                                <div class="stat-card primary">
                                    <div class="stat-icon">📊</div>
                                    <div class="stat-info"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Audit</div></div>
                                </div>
                                <div class="stat-card success">
                                    <div class="stat-icon">✅</div>
                                    <div class="stat-info"><div class="stat-value" id="statCompleted">0</div><div class="stat-label">Selesai</div></div>
                                </div>
                                <div class="stat-card warning">
                                    <div class="stat-icon">📝</div>
                                    <div class="stat-info"><div class="stat-value" id="statDraft">0</div><div class="stat-label">Draft</div></div>
                                </div>
                                <div class="stat-card danger">
                                    <div class="stat-icon">⚠️</div>
                                    <div class="stat-info"><div class="stat-value" id="statFail">0</div><div class="stat-label">Item Fail</div></div>
                                </div>
                            </div>
                            <div class="section-title">
                                <span>Audit Terbaru</span>
                                <a href="#" onclick="navigateTo('newAudit');return false;">+ Audit Baru</a>
                            </div>
                            <div class="audit-list" id="recentAudits"></div>
                        </div>
<div class="card"><div class="card-body"><h3>Dashboard</h3><p>Pindahkan elemen dashboard Anda dari file index.html ke area ini.</p></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
