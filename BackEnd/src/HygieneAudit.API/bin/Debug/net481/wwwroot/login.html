<!DOCTYPE html>
<html lang="id" class="light-style" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hygiene Audit App</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="loginPage" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#696cff,#a367fc); padding:20px;">
        <div class="login-card" style="background:#fff; border-radius:1rem; padding:2.5rem 2rem; width:100%; max-width:420px;">
            <div class="login-logo" style="text-align:center; margin-bottom:2rem;">
                <h1>Hygiene Audit</h1>
                <p>Silakan masuk ke akun Anda</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group" style="margin-bottom:15px;">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="loginUsername" required>
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </form>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
